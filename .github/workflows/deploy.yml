name: Build & Deploy (Astro + MkDocs)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Setup Node for Astro
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Setup Python for MkDocs
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install MkDocs deps
        run: |
          pip install -r docs/requirements.txt

      - name: Build MkDocs -> site/public/notes
        run: |
          mkdocs build -f docs/mkdocs.yml -d ../site/public/notes
        working-directory: ./docs

      - name: Install Node deps
        run: npm ci
        working-directory: ./site

      - name: Build Astro
        run: npm run build
        working-directory: ./site

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: site/dist
